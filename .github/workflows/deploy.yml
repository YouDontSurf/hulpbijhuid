# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine deploy config
        id: config
        run: |
          # Custom domain or path-based
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "site_url=${{ vars.SITE_URL }}" >> $GITHUB_OUTPUT
          else
            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            echo "site_url=https://${OWNER,,}.github.io/${REPO}" >> $GITHUB_OUTPUT
            echo "base_path=/${REPO}" >> $GITHUB_OUTPUT
            echo "repo_name=${REPO}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ steps.config.outputs.site_url || 'https://hulpbijhuid.nl' }}
          ASTRO_BASE: ${{ steps.config.outputs.base_path }}

      - name: Create CNAME for custom domain
        if: vars.DOMAIN != ''
        run: echo "${{ vars.DOMAIN }}" > dist/CNAME
        working-directory: ${{ github.workspace }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
